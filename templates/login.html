<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WVS — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0f1117; --bg2: #181b23; --bg3: #1e2230;
      --border: #2a2f3f; --border2: #363c4e;
      --accent: #2dd4bf; --accent2: #14b8a6;
      --green: #22c55e; --red: #ef4444;
      --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
      --mono: 'JetBrains Mono', 'Fira Code', monospace;
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--sans); color: var(--text);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 600px 400px at 30% 50%, rgba(45,212,191,0.04) 0%, transparent 70%),
                  radial-gradient(ellipse 500px 500px at 70% 30%, rgba(45,212,191,0.03) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-box {
      position: relative; z-index: 1;
      width: 380px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      animation: fadein 0.5s ease both;
    }
    @keyframes fadein { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }

    .login-box::before {
      content: '';
      display: block; height: 3px; width: 100%;
      background: linear-gradient(90deg, var(--accent), transparent);
      border-radius: 12px 12px 0 0;
    }

    .login-header {
      padding: 32px 32px 20px;
      border-bottom: 1px solid var(--border);
    }
    .login-tag {
      font-family: var(--mono); font-size: 11px; color: var(--accent);
      margin-bottom: 12px;
    }
    .login-title {
      font-size: 28px; font-weight: 700;
      color: var(--text); letter-spacing: -0.5px;
    }
    .login-sub {
      font-size: 13px; color: var(--text3); margin-top: 6px;
    }

    .login-body { padding: 28px 32px; }

    .error-msg {
      background: rgba(239,68,68,0.06);
      border: 1px solid rgba(239,68,68,0.2);
      border-left: 3px solid var(--red);
      padding: 10px 14px; border-radius: 6px;
      font-size: 12px; color: var(--red);
      margin-bottom: 20px;
    }

    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block; font-size: 11px; font-weight: 500;
      color: var(--text3); margin-bottom: 6px;
    }
    .form-control {
      width: 100%; background: var(--bg3);
      border: 1px solid var(--border2); border-radius: 6px;
      padding: 10px 14px; color: var(--text);
      font-family: var(--mono); font-size: 13px; outline: none;
      transition: border-color 0.12s;
    }
    .form-control:focus { border-color: var(--accent); }

    .btn-login {
      width: 100%; padding: 12px;
      background: var(--accent); color: #0f1117;
      border: none; border-radius: 6px; cursor: pointer;
      font-size: 14px; font-weight: 600;
      transition: background 0.12s;
      margin-top: 8px;
    }
    .btn-login:hover { background: var(--accent2); }

    .login-footer {
      padding: 16px 32px;
      border-top: 1px solid var(--border);
      font-family: var(--mono); font-size: 11px; color: var(--text3);
      display: flex; justify-content: space-between;
    }
    .dot-online { color: var(--green); }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-header">
      <div class="login-tag">&#9632; WSN-EK v2.0</div>
      <div class="login-title">PervTrack</div>
      <div class="login-sub">Wireless Sensor Network Monitor</div>
    </div>
    <div class="login-body">
      {% if error %}
      <div class="error-msg">{{ error }}</div>
      {% endif %}
      <form method="POST" action="/login">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="form-control" type="text" name="username"
                 autocomplete="username" autofocus placeholder="admin"/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" name="password"
                 autocomplete="current-password" placeholder="••••••"/>
        </div>
        <button class="btn-login" type="submit">Authenticate →</button>
      </form>
    </div>
    <div class="login-footer">
      <span>COM1 · MySQL 5</span>
      <span class="dot-online">● SYSTEM READY</span>
    </div>
  </div>
</body>
</html>
